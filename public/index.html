<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OnSpot</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <nav>
      <span class="logo">OnSpot</span>
      <span id="userInfo"></span>
      <button id="authBtn">Login</button>
    </nav>

    <div class="share-bar">
      <button id="startBtn">Share My Location</button>
    </div>

    <div id="map"></div>

    <!-- Login Modal -->
    <div class="modal-overlay" id="loginOverlay">
      <div class="modal">
        <button class="close-btn" id="loginClose">&times;</button>
        <h2>Sign in</h2>
        <p class="subtitle" id="loginSubtitle"></p>
        <form id="loginForm">
          <input type="email" id="loginEmail" placeholder="Email" required />
          <input type="password" id="loginPassword" placeholder="Password" required />
          <div class="error" id="loginError"></div>
          <button type="submit" id="loginSubmit">Sign in</button>
        </form>
        <div class="switch">No account? <a id="showSignup">Sign up</a></div>
      </div>
    </div>

    <!-- Signup Modal -->
    <div class="modal-overlay" id="signupOverlay">
      <div class="modal">
        <button class="close-btn" id="signupClose">&times;</button>
        <h2>Create account</h2>
        <form id="signupForm">
          <input type="text" id="signupName" placeholder="Name" required />
          <input type="email" id="signupEmail" placeholder="Email" required />
          <input type="password" id="signupPassword" placeholder="Password" required />
          <div class="error" id="signupError"></div>
          <button type="submit" id="signupSubmit">Sign up</button>
        </form>
        <div class="switch">Have an account? <a id="showLogin">Sign in</a></div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
