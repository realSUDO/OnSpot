<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Location Sharing Application</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      #map {
        height: calc(100vh - 60px);
      }
    </style>
  </head>
  <body>
    <div style="text-align:center;padding:8px">
      <button id="startBtn" style="padding:10px 24px;font-size:16px">Share My Location</button>
    </div>
    <div id="map"></div>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/socket.io/socket.io.js"></script>

    <script>
      const socket = io();
      const map = L.map('map').setView([51.505, -0.09], 13);

      const remoteMarkers = new Map();

      socket.on('server:location:update', (data) => {
        const { id, latitude, longitude } = data;
        if (!remoteMarkers.has(id)) {
          const marker = L.marker([latitude, longitude])
            .addTo(map)
            .bindPopup(id);
          remoteMarkers.set(id, marker);
        } else {
          const existingMarker = remoteMarkers.get(id);
          existingMarker.setLatLng([latitude, longitude]); // This line is not updating UI
        }
      });

      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution:
          '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      }).addTo(map);

      let myCurrentLocationMarker = null;

      function placeMarker(latitude, longitude) {
        socket.emit('client:location:update', { latitude, longitude });
        if (!myCurrentLocationMarker) {
          myCurrentLocationMarker = L.marker([latitude, longitude])
            .addTo(map)
            .bindPopup('You are here')
            .openPopup();
          map.setView([latitude, longitude], 15);
        } else {
          myCurrentLocationMarker.setLatLng([latitude, longitude]);
          map.setView([latitude, longitude], map.getZoom());
        }
      }

      function main() {
        if (!('geolocation' in navigator)) {
          alert('Geolocation is not available in this browser');
          return;
        }

        navigator.geolocation.watchPosition(
          (position) => placeMarker(position.coords.latitude, position.coords.longitude),
          (err) => {
            console.warn('Geolocation error:', err.message);
            // Click on map to manually set your location
            map.once('click', (e) => {
              placeMarker(e.latlng.lat, e.latlng.lng);
            });
            const info = L.control({ position: 'topright' });
            info.onAdd = () => {
              const div = L.DomUtil.create('div');
              div.style.cssText = 'background:white;padding:8px;border-radius:4px;font-size:14px';
              div.innerHTML = 'GPS unavailable - <b>click map</b> to place yourself';
              return div;
            };
            info.addTo(map);
          },
          { enableHighAccuracy: false, timeout: 30000, maximumAge: 60000 },
        );
      }

      document.getElementById('startBtn').addEventListener('click', main);
    </script>
  </body>
</html>
